services:
  - type: web
    name: medical-intelligence-api
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # You will add your GEMINI_API_KEY securely in the Render dashboard later!
