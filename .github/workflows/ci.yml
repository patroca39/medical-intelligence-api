name: FastAPI Medical Intelligence CI

# 🛑 Disabled automatic triggers to preserve GitHub Actions minutes
on:
  # 🚀 Allows you to trigger the workflow manually from the GitHub Actions tab whenever you want to test
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mupdf mupdf-tools

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify FastAPI Build
      run: |
        python -c "from main import app; print('FastAPI application successfully loaded.')"
