name: FastAPI Medical Intelligence CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y mupdf mupdf-tools

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify FastAPI Build
      run: |
        # A simple check to ensure the syntax is valid and the app can be imported without crashing
        python -c "from main import app; print('FastAPI application successfully loaded.')"
